<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>15s Gaze - Fly Project</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: white;
            font-family: 'Pretendard', sans-serif;
            touch-action: none;
        }

        #container { width: 100%; height: 100%; position: relative; }

        /* --- 1. 캐릭터 설정 --- */
        #character {
            position: fixed; top: 0; left: 0;
            width: 30px; 
            pointer-events: none; z-index: 10;
            display: none;
            /* 이미지의 상단 중앙을 기준으로 회전 */
            transform-origin: top center; 
            will-change: transform;
        }

        #fly-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* --- 2. 대기 화면 (폰트 크기 대폭 확대) --- */
        #waiting-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background-color: black; z-index: 20;
        }

        #waiting-content {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; width: 80%; max-width: 600px;
        }

        #status-msg {
            color: white; 
            font-size: 5vw; /* 폰트 크기를 키움 (반응형) */
            font-weight: 800;
            display: block; 
            margin-bottom: 30px; 
            letter-spacing: -0.02em;
        }

        .eyes-wrapper { display: flex; justify-content: space-between; gap: 15px; }
        .eye-container {
            flex: 1; aspect-ratio: 1.8 / 1; position: relative; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        .eye-shape {
            background-color: white; width: 70%; height: 85%; position: absolute;
            border-radius: 40% 60% 40% 60% / 30% 70% 30% 70%;
        }
        .eye-container:last-child .eye-shape { transform: scaleX(-1); }
        .pupil { background-color: black; width: 40%; aspect-ratio: 1 / 1; border-radius: 50%; }

        /* --- 3. 결과 화면 --- */
        #svgPathContainer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: none; background-color: white; z-index: 30;
        }
        #pathSvg { width: 100%; height: 100%; }
        #ui-overlay { display: none; position: fixed; bottom: 8%; left: 50%; transform: translateX(-50%); z-index: 40; }
        #download-btn { padding: 12px 24px; background: black; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="container">
    <div id="character">
        <img id="fly-img" src="fly.png" alt="fly">
    </div>

    <div id="waiting-overlay">
        <div id="waiting-content">
            <span id="status-msg">Waiting for <span id="out-timer">0</span> seconds</span>
            <div class="eyes-wrapper">
                <div class="eye-container"><div class="eye-shape"></div><div class="pupil"></div></div>
                <div class="eye-container"><div class="eye-shape"></div><div class="pupil"></div></div>
            </div>
        </div>
    </div>

    <div id="svgPathContainer">
        <svg id="pathSvg"><polyline id="pathPolyline" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/></svg>
    </div>
</div>

<div id="ui-overlay">
    <button id="download-btn">이미지 저장하기</button>
</div>

<script>
    const TARGET_SECONDS = 15; // 15초 버전으로 수정
    let totalOutTimeMs = 0, outStartTime = null, stayStartTime = Date.now();
    let path = [], isFinished = false, msgTimeout = null;

    const char = document.getElementById('character');
    const flyImg = document.getElementById('fly-img');
    const waiting = document.getElementById('waiting-overlay');

    let angle = 0;
    let amplitude = 25; 
    let lastMoveTime = Date.now();

    // 눈 깜빡임 (이미지 교체)
    setInterval(() => {
        if (isFinished) return;
        flyImg.src = 'fly_closed.png';
        setTimeout(() => { flyImg.src = 'fly.png'; }, 200);
    }, 4000);

    // 스윙 애니메이션
    function animateSwing() {
        if (isFinished) return;
        const now = Date.now();
        const idleTime = (now - lastMoveTime) / 1000;
        const currentAmplitude = Math.max(0, amplitude * Math.exp(-0.15 * idleTime));
        angle += 0.15;
        const rotation = Math.sin(angle) * currentAmplitude;
        
        // 마우스 끝 지점(상단 중앙)을 기준으로 회전 유지
        char.style.transform = `translate(-50%, 0) rotate(${rotation}deg)`;
        requestAnimationFrame(animateSwing);
    }
    animateSwing();

    function updatePos(x, y) {
        if (isFinished || outStartTime) return;
        path.push({ x, y });
        char.style.display = 'block';

        /* 포인터의 '막대 끝'에 매달리게 하기:
           일반적인 마우스 포인터는 좌상단이 기준이지만, 
           사용자가 인지하는 화살표 끝부분에 맞추기 위해 
           y좌표에 약간의 오프셋을 줄 수 있습니다. 
           여기서는 입력받은 x, y 지점 바로 아래에 캐릭터 상단이 오도록 설정했습니다.
        */
        char.style.left = x + 'px';
        char.style.top = (y + 5) + 'px'; // 포인터 끝에서 5px 정도 아래에 매달림
        
        lastMoveTime = Date.now();
    }

    window.addEventListener('mousemove', e => updatePos(e.clientX, e.clientY));
    window.addEventListener('touchmove', e => {
        const t = e.touches[0];
        updatePos(t.clientX, t.clientY);
        e.preventDefault();
    }, { passive: false });

    function userLeft() {
        if (isFinished) return;
        outStartTime = Date.now();
        msgTimeout = setTimeout(() => {
            char.style.display = 'none';
            waiting.style.display = 'block';
        }, 200);
    }

    function userReturned() {
        if (isFinished) return;
        if (outStartTime) {
            totalOutTimeMs += Date.now() - outStartTime;
            outStartTime = null;
        }
        clearTimeout(msgTimeout);
        setTimeout(() => { if (!outStartTime) waiting.style.display = 'none'; }, 500);
    }

    window.addEventListener('blur', userLeft);
    window.addEventListener('focus', userReturned);
    document.addEventListener('mouseleave', userLeft);
    document.addEventListener('mouseenter', userReturned);

    setInterval(() => {
        if (isFinished) return;
        let currentOut = totalOutTimeMs + (outStartTime ? Date.now() - outStartTime : 0);
        document.getElementById('out-timer').textContent = Math.floor(currentOut/1000);
        if (Date.now() - stayStartTime - totalOutTimeMs >= TARGET_SECONDS * 1000) finish();
    }, 100);

    function finish() {
        isFinished = true;
        char.style.display = 'none';
        waiting.style.display = 'none';
        document.getElementById('svgPathContainer').style.display = 'block';
        document.getElementById('ui-overlay').style.display = 'block';
        const poly = document.getElementById('pathPolyline');
        if (path.length > 0) {
            const xs = path.map(p => p.x), ys = path.map(p => p.y);
            const minX = Math.min(...xs)-50, minY = Math.min(...ys)-50;
            const w = Math.max(...xs)-minX+50, h = Math.max(...ys)-minY+50;
            document.getElementById('pathSvg').setAttribute('viewBox', `${minX} ${minY} ${w} ${h}`);
            poly.setAttribute('points', path.map(p => `${p.x},${p.y}`).join(' '));
        }
    }
</script>
</body>
</html>
